<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>IBNOV - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/global.css">
</head>
<body class="centralize">
  <header>
    <nav class="navbar navbar-expand-lg fixed-top">
      <a href="index.html"><img src="img/image.png" style="padding-left: 20px;" alt="Logo"></a>
    </nav>
  </header>

  <section class="container">
    <h2>IBNOV - LOGIN</h2>
<hr>
    <form class="form" method="get" action="#" onsubmit="return login(event)">
      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input type="email" class="form-control" name="email" id="email" onchange="onChangeEmail()" onblur="onChangeEmail()" placeholder="Digite o seu E-mail">
        <div class="error" id="email-invalid-error">Por favor, insira um e-mail válido.</div>
        <div class="error" id="email-required-error">O campo de e-mail é obrigatório.</div>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Senha</label>
        <input type="password" class="form-control" name="password" id="password" onchange="onChangePassword()" onblur="onChangePassword()" placeholder="Digite a sua senha">
        <div class="error" id="password-required-error">O campo de senha é obrigatório.</div>
      </div>
      <div class="mb-3 text-center">
        <p>Esqueceu a senha?<a id="recover-password-button" onclick="recoverPassword()">Clique aqui</a></p>
      </div>
      <div class="d-flex justify-content-center">
        <button type="submit" class="btn btn-primary" name="submit" id="login-button">Entrar</button>
      </div>
    </form>
  <hr>
    <div class="d-flex justify-content-between align-items-center mt-3">
      <div>
        <p>Criar uma conta!<a href="cadastro.html">Cadastrar</a></p> 
      </div>
      <div>
        <a href="index.html">Início</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="row">
      <div class="float-start">
        <div class="col mt-2">
          <a class="logo my-3" href="index.html"><img src="img/image.png" alt="Logo" style="padding-left: 20px;"></a>
        </div>
        <p class="footer-links m-0">
          <a href="index.html">Início</a>
          <a href="sobre.html">Sobre</a>
          <a href="contato.html">Contato</a>
        </p>
      </div>
      <div class="float-end">
        <p class="m-0">© 2024 IBNOV. Todos os direitos reservados.</p>
      </div>

    </div>
  </footer>
 
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/login.js"></script>
<script src="js/loading.js"></script>
<script src="js/validations.js"></script>
</body>



</html>
